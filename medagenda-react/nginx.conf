# Configuração Nginx para o SPA React + Vite e Proxy para API Backend no Docker
server {
    listen 80;
    server_name localhost;

    # Servir arquivos estáticos da Single Page Application (SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso para as chamadas REST da API Node.js/Express no container backend
    location /api {
        proxy_pass http://backend:5000/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
