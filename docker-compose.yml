services:
  postgres:
    image: postgres:16-alpine
    container_name: medagenda-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medagenda_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medagenda_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./medagenda-react/server
      dockerfile: Dockerfile
    container_name: medagenda-backend
    restart: always
    environment:
      PORT: 5000
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/medagenda_db?schema=public"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./medagenda-react
      dockerfile: Dockerfile
    container_name: medagenda-frontend
    restart: always
    ports:
      - "5173:80"
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
